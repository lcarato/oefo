<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OEFO Pipeline Dashboard</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>

    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
        }
        .dashboard-container {
            background: linear-gradient(135deg, #0f172a 0%, #1a202c 100%);
            color: #e2e8f0;
        }
        .card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .card:hover {
            border-color: rgba(100, 116, 139, 0.5);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }
        .kpi-card {
            padding: 1.5rem;
            text-align: center;
        }
        .kpi-value {
            font-size: 1.875rem;
            font-weight: 700;
            color: #06b6d4;
            margin: 0.5rem 0;
            transition: all 0.4s ease;
        }
        .kpi-label {
            font-size: 0.875rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .tab-button {
            padding: 0.75rem 1.5rem;
            border: none;
            background: rgba(51, 65, 85, 0.5);
            color: #cbd5e1;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 0.5rem;
            margin-right: 0.5rem;
            transition: all 0.3s ease;
        }
        .tab-button.active {
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
            color: #fff;
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
        }
        .tab-button:hover:not(.active) {
            background: rgba(71, 85, 105, 0.7);
        }
        .chart-container {
            padding: 1.5rem;
            height: 300px;
        }
        .recharts-wrapper {
            width: 100% !important;
            height: 100% !important;
        }
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        .status-accepted { background: rgba(34, 197, 94, 0.2); color: #86efac; }
        .status-flagged  { background: rgba(251, 146, 60, 0.2); color: #fed7aa; }
        .status-rejected { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }

        /* Live streaming indicator */
        .stream-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .stream-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transition: background 0.3s ease;
        }
        .stream-dot.connected {
            background: #22c55e;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
            animation: pulse-green 2s infinite;
        }
        .stream-dot.connecting {
            background: #f59e0b;
            animation: pulse-amber 1s infinite;
        }
        .stream-dot.disconnected {
            background: #ef4444;
        }
        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 4px rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 12px rgba(34, 197, 94, 0.8); }
        }
        @keyframes pulse-amber {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Value change flash animation */
        @keyframes flash-update {
            0% { color: #22d3ee; }
            50% { color: #67e8f9; }
            100% { color: #06b6d4; }
        }
        .kpi-updated {
            animation: flash-update 0.6s ease;
        }
    </style>
</head>

        // =====================================================================

        // =====================================================================
        const { useState, useEffect, useRef, useCallback } = React;
        const { BarChart, Bar, PieChart, Pie, Cell, LineChart, Line, XAxis, YAxis,

        const COLORS = {

        // ---- SSE Stream Hook ---------------------------------------------------
        function useSSEStream(url) {
            const [data, setData] = useState(FALLBACK_DATA);
            const [status, setStatus] = useState('connecting'); // connected | connecting | disconnected
            const [updateCount, setUpdateCount] = useState(0);
            const esRef = useRef(null);
            const retryRef = useRef(0);

            const connect = useCallback(() => {
                if (esRef.current) {
                    esRef.current.close();
                }
                setStatus('connecting');

                const es = new EventSource(url);
                esRef.current = es;

                es.addEventListener('snapshot', (event) => {
                    try {
                        const snapshot = JSON.parse(event.data);
                        setData(snapshot);
                        setStatus('connected');
                        setUpdateCount(c => c + 1);
                        retryRef.current = 0;
                    } catch (err) {
                        console.warn('Failed to parse SSE snapshot:', err);
                    }
                });

                es.onerror = () => {
                    es.close();
                    setStatus('disconnected');
                    // Exponential backoff reconnect (max 30s)
                    const delay = Math.min(1000 * Math.pow(2, retryRef.current), 30000);
                    retryRef.current += 1;
                    setTimeout(connect, delay);
                };

                es.onopen = () => {
                    setStatus('connected');
                    retryRef.current = 0;
                };
            }, [url]);

            useEffect(() => {
                connect();
                return () => {
                    if (esRef.current) esRef.current.close();
                };
            }, [connect]);

            return { data, status, updateCount };
        }

        // ---- Stream status indicator -------------------------------------------
        function StreamIndicator({ status, updateCount, generatedAt }) {
            const label = {
                connected: 'Live',
                connecting: 'Connecting',
                disconnected: 'Reconnecting'

            const timeStr = generatedAt
                ? new Date(generatedAt).toLocaleTimeString('en-US', {
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
                  })
                : '--:--:--';

            return React.createElement('div', { className: 'stream-status' },
                React.createElement('span', { className: `stream-dot ${status}` }),
                React.createElement('span', { style: { color: status === 'connected' ? '#86efac' : status === 'connecting' ? '#fde68a' : '#fca5a5' } }, label),
                React.createElement('span', { style: { color: '#64748b', marginLeft: '0.5rem' } },
                    `Updated ${timeStr}`),
                status === 'connected'
                    ? React.createElement('span', { style: { color: '#475569', marginLeft: '0.5rem' } },
                        `(${updateCount} updates)`)
                    : null
            );
        }

        // ---- Data Analytics Tab ------------------------------------------------
        function DataAnalytics({ data, updated }) {
            const d = data;
            const db = d.database || {};
            const fin = d.financials || {};
            const cov = d.coverage || {};

            const yearData = Object.entries(db.by_year || {}).map(

            const kdTechData = Object.entries(fin.kd_by_technology || {})

            const getWACCColor = (w) => w < 6 ? '#10b981' : w < 8 ? '#f59e0b' : '#ef4444';

            const kd = fin.kd_nominal || {};

            const totalObs = db.total_observations || 0;

            return React.createElement('div', { className: 'space-y-6' },

                React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4' },

                    React.createElement(KPICard, { label: 'Mean Ke', value: ke.mean != null ? ke.mean.toFixed(2) : '—', unit: '%', updated }),
                    React.createElement(KPICard, { label: 'Mean WACC', value: wacc.mean != null ? wacc.mean.toFixed(2) : '—', unit: '%', updated }),
                    React.createElement(KPICard, { label: 'Mean Leverage', value: lev.mean != null ? lev.mean.toFixed(1) : '—', unit: '%', updated }),
                    React.createElement(KPICard, { label: 'Observations', value: totalObs.toLocaleString(), updated })
                ),

                // Kd by tech + WACC by country
                React.createElement('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-6' },
                    React.createElement('div', { className: 'card' },
                        React.createElement('h3', { className: 'text-lg font-bold p-4 border-b border-slate-700' }, 'Kd by Technology (Top 10)'),
                        React.createElement('div', { className: 'chart-container' },

        // ---- Main Dashboard Component ------------------------------------------
        function Dashboard() {
            const [activeTab, setActiveTab] = useState('pipeline');

            // Determine SSE URL: same origin /stream, or fallback static
            const sseUrl = window.location.origin + '/stream';
            const { data, status, updateCount } = useSSEStream(sseUrl);

            // Track whether the most recent update is "new" for flash animations
            const [flashKey, setFlashKey] = useState(0);
            const prevCount = useRef(0);
            useEffect(() => {
                if (updateCount > prevCount.current) {
                    setFlashKey(k => k + 1);
                    prevCount.current = updateCount;
                }
            }, [updateCount]);

            const updated = flashKey > 0;

            return React.createElement('div', { className: 'min-h-screen py-8 px-4 md:px-8' },
                React.createElement('div', { className: 'max-w-7xl mx-auto' },

                    // Header
                    React.createElement('div', { className: 'mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4' },
                        React.createElement('div', null,
                            React.createElement('h1', { className: 'text-4xl font-bold text-white mb-2' }, 'OEFO Pipeline Dashboard'),
                            React.createElement('p', { className: 'text-slate-400' }, 'Open Energy Finance Observatory')
                        ),
                        React.createElement(StreamIndicator, {
                            status, updateCount, generatedAt: data.generated_at
                        })
                    ),

                    // Tabs
                    React.createElement('div', { className: 'mb-6 flex gap-2' },
                        React.createElement('button', {
                            className: 'tab-button' + (activeTab === 'pipeline' ? ' active' : ''),
                            onClick: () => setActiveTab('pipeline')
                        }, 'Pipeline Monitor'),
                        React.createElement('button', {
                            className: 'tab-button' + (activeTab === 'analytics' ? ' active' : ''),
                            onClick: () => setActiveTab('analytics')
                        }, 'Data Analytics')
                    ),

                    // Tab content
                    React.createElement('div', null,
                        activeTab === 'pipeline'
                            ? React.createElement(PipelineMonitor, { data, updated, key: 'pm' + flashKey })
                            : React.createElement(DataAnalytics, { data, updated, key: 'da' + flashKey })
                    ),

                    // Footer
                    React.createElement('div', {
                        className: 'mt-12 pt-6 border-t border-slate-700 text-center text-sm text-slate-500'
                    },
                        'Pipeline v', data.pipeline_version || '0.1.0',
                        ' | Streaming from ', window.location.origin, '/stream'
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(Dashboard));
    </script>
</body>
</html>
